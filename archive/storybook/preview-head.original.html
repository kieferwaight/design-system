<!-- Docs typography overrides — keep in sync with .storybook/theme.ts -->
<style>
  /* Hide scrollbars everywhere (canvas, docs, code blocks) — keep scrolling. */
  *::-webkit-scrollbar {
    width: 0 !important;
    height: 0 !important;
    display: none !important;
  }
  * {
    scrollbar-width: none !important;
    -ms-overflow-style: none !important;
  }
  /* H1 titles render with the peach → pink → mauve Macchiato gradient.
     (Gradient text can't be expressed via the Storybook theme object.) */
  .sbdocs.sbdocs-h1,
  .sbdocs h1,
  .sbdocs-title {
    font-family: "Cascadia Code NF", "Cascadia Code", ui-monospace, "SF Mono", monospace;
    background: linear-gradient(90deg, #f5a97f 0%, #f5bde6 50%, #c6a0f6 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
  }

  /* Docs tables — Macchiato surfaces, rounded + clipped corners, zebra rows. */
  .sbdocs.sbdocs-content table,
  .sbdocs table {
    border-collapse: separate !important;
    border-spacing: 0;
    width: 100%;
    margin: 1.75rem 0;
    border: 1px solid #494d64; /* surface1 */
    border-radius: 12px;
    overflow: hidden; /* clips cell backgrounds to the rounded corners */
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.28);
    font-family: "Cascadia Code NF", "Cascadia Code", ui-monospace, "SF Mono", monospace;
    font-size: 0.85rem;
  }
  .sbdocs.sbdocs-content table thead,
  .sbdocs table thead {
    background: linear-gradient(180deg, #363a4f 0%, #2d3145 100%); /* surface0 */
  }
  .sbdocs.sbdocs-content table th,
  .sbdocs table th {
    color: #c6a0f6 !important; /* mauve */
    text-align: left;
    padding: 13px 18px !important;
    font-weight: 700;
    letter-spacing: 0.01em;
    border: none !important;
    border-bottom: 1px solid #494d64 !important;
  }
  .sbdocs.sbdocs-content table td,
  .sbdocs table td {
    color: #cad3f5 !important; /* text */
    padding: 11px 18px !important;
    border: none !important;
    border-bottom: 1px solid #363a4f !important; /* surface0 separators */
  }
  .sbdocs.sbdocs-content table tbody tr:last-child td,
  .sbdocs table tbody tr:last-child td {
    border-bottom: none !important;
  }
  .sbdocs.sbdocs-content table tbody tr:nth-child(even),
  .sbdocs table tbody tr:nth-child(even) {
    background: rgba(54, 58, 79, 0.35); /* faint surface0 zebra */
  }
  .sbdocs.sbdocs-content table tbody tr:hover,
  .sbdocs table tbody tr:hover {
    background: rgba(138, 173, 244, 0.12); /* blue hover */
    transition: background 0.12s ease;
  }
  /* First column reads like a label — tint it toward the accent. */
  .sbdocs.sbdocs-content table tbody td:first-child,
  .sbdocs table tbody td:first-child {
    color: #8aadf4 !important; /* blue */
    font-weight: 600;
  }

  /* Docblock source — code preview blocks. Deep crust inset, rounded + clipped.
     Set the container bg to crust too so the Copy-button footer strip matches
     the code body instead of showing Storybook's default grey-green. */
  .sbdocs .docblock-source {
    background: #181926 !important; /* crust — kills the mismatched footer strip */
    border-radius: 12px !important;
    border: 1px solid #494d64 !important; /* surface1 */
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
    overflow: hidden;
    margin: 1.5rem 0;
  }
  /* The footer/actions row inheriting crust — keep the Copy button subtle. */
  .sbdocs .docblock-source > div {
    background: transparent !important;
  }
  .sbdocs .docblock-source pre {
    background: #181926 !important; /* crust */
    margin: 0 !important;
    border: none !important;
    border-radius: 0 !important;
    font-family: "Cascadia Code NF", "Cascadia Code", ui-monospace, "SF Mono", monospace !important;
    font-size: 0.82rem;
  }
  /* The "Show code" toggle sitting on the source block. */
  .sbdocs .docblock-source button {
    background: #363a4f !important; /* surface0 */
    color: #c6a0f6 !important; /* mauve */
    border-color: #494d64 !important;
  }

  /* Inline `code` in prose — small Macchiato pill. */
  .sbdocs-content :not(pre) > code {
    background: #363a4f !important; /* surface0 */
    color: #f5a97f !important; /* peach */
    border: 1px solid #494d64;
    border-radius: 6px;
    padding: 0.1em 0.4em;
    font-family: "Cascadia Code NF", "Cascadia Code", ui-monospace, "SF Mono", monospace !important;
    font-size: 0.85em;
  }
</style>
